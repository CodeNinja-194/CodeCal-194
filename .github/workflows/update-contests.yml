name: Auto Update Contests

on:
  schedule:
    - cron: "0 0,12 * * *" # Runs at 00:00 and 12:00 UTC (Twice a day)
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Trigger Database Sync
        run: |
          echo "Triggering Vercel scraping engine..."
          # Call the update endpoint to fetch latest from websites and update Supabase
          curl -f -X GET "https://codecal-194.vercel.app/api/cron/updateContests" \
               -H "Accept: application/json"

      - name: Wait for Sync
        run: sleep 5 # Give the DB a moment to settle

      - name: Update contests.json for Repo
        run: |
          echo "Fetching updated contest list for public/contests.json..."
          # Fetch the latest contests and save to the public directory
          curl -f -X GET "https://codecal-194.vercel.app/api/contests" \
               -H "Accept: application/json" \
               -o public/contests.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/contests.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes in contest data."
          else
            git commit -m "auto: update contest data [skip ci]"
            git push
          fi