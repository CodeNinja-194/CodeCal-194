name: Auto Update Contests

on:
  schedule:
    - cron: "0 12 * * 1" # Monday 12:00 UTC
    - cron: "0 12 * * 4" # Thursday 12:00 UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Fetcher Script
        run: npm run update:contests

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/contests.json
          
          if git diff --staged --quiet; then
            echo "No changes in contest data."
          else
            git commit -m "auto: update contest data [skip ci]"
            git push
          fi